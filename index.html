<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6-Digit Drop Share (15 Min Expired)</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Sarabun, sans-serif;
        }
        body {
            background-color: #0d0d0d;
            color: #ffffff;
            display: block;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 650px;
            margin: 0 auto;
            background-color: #1a1a1a;
            border: 1px solid #333333;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
        }
        h1 {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
            color: #ffffff;
        }
        .subtitle {
            text-align: center;
            color: #aaaaaa;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .highlight {
            color: #ff3333;
            font-weight: bold;
        }
        .config-box {
            background-color: #222222;
            border: 1px solid #444444;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 30px;
        }
        .config-box h3 {
            font-size: 14px;
            color: #ff3333;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .grid-2 {
            display: table;
            width: 100%;
            margin-bottom: 10px;
        }
        .grid-cell {
            display: table-cell;
            width: 50%;
            padding-right: 10px;
        }
        .grid-cell:last-child {
            padding-right: 0;
            padding-left: 10px;
        }
        label {
            display: block;
            font-size: 12px;
            color: #bbbbbb;
            margin-bottom: 5px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px;
            background-color: #111111;
            border: 1px solid #444444;
            border-radius: 6px;
            color: #ffffff;
            font-size: 13px;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            border-color: #ff3333;
            outline: none;
        }
        .section-title {
            font-size: 16px;
            font-weight: bold;
            border-left: 4px solid #ff3333;
            padding-left: 10px;
            margin-bottom: 15px;
            margin-top: 20px;
        }
        .card {
            background-color: #222222;
            border: 1px solid #333333;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
        }
        .file-drop-area {
            border: 2px dashed #444444;
            border-radius: 6px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            background-color: #151515;
            transition: all 0.3s;
        }
        .file-drop-area:hover {
            border-color: #ff3333;
            background-color: #1a1212;
        }
        .file-input {
            display: none;
        }
        .btn {
            display: block;
            width: 100%;
            background-color: #ff3333;
            color: #ffffff;
            border: none;
            padding: 12px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
            transition: background 0.2s;
            margin-top: 15px;
        }
        .btn:hover {
            background-color: #cc0000;
        }
        .btn:disabled {
            background-color: #555555;
            cursor: not-allowed;
        }
        .code-display {
            display: none;
            background-color: #000000;
            border: 2px solid #ff3333;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            margin-top: 15px;
        }
        .code-number {
            font-size: 36px;
            font-weight: bold;
            letter-spacing: 4px;
            color: #ff3333;
            margin: 10px 0;
        }
        .receive-input-wrapper {
            display: table;
            width: 100%;
        }
        .receive-input-cell {
            display: table-cell;
            width: 70%;
            padding-right: 10px;
        }
        .receive-btn-cell {
            display: table-cell;
            width: 30%;
            vertical-align: bottom;
        }
        .receive-input-wrapper input {
            font-size: 20px;
            letter-spacing: 2px;
            text-align: center;
            padding: 10px;
        }
        .receive-btn-cell .btn {
            margin-top: 0;
            padding: 13px;
        }
        .status-msg {
            font-size: 13px;
            margin-top: 10px;
            text-align: center;
        }
        .status-success { color: #00ffcc; }
        .status-error { color: #ff3333; }
        .status-loading { color: #ffff00; }
    </style>
</head>
<body>

    <div class="container">
        <h1>6-DIGIT <span class="highlight">DROP SHARE</span></h1>
        <div class="subtitle">ระบบส่งไฟล์ข้ามอุปกรณ์ด่วน ทำลายตัวเองใน 15 นาที</div>

        <div class="config-box">
            <h3>⚙️ ตั้งค่าการเชื่อมต่อ Supabase</h3>
            <div class="grid-2">
                <div class="grid-cell">
                    <label for="supabase-url">Supabase URL</label>
                    <input type="text" id="supabase-url" placeholder="https://xyz.supabase.co">
                </div>
                <div class="grid-cell">
                    <label for="supabase-key">Supabase Anon Key</label>
                    <input type="password" id="supabase-key" placeholder="ใส่รหัส Anon Key ที่นี่">
                </div>
            </div>
        </div>

        <div class="section-title">📤 ส่งไฟล์ (Upload)</div>
        <div class="card">
            <div class="file-drop-area" id="drop-area">
                <span id="drop-text">📁 ลากไฟล์มาวางที่นี่ หรือ คลิกเพื่อเลือกไฟล์</span>
                <input type="file" id="file-input" class="file-input">
            </div>
            <div id="file-info" style="margin-top: 10px; font-size: 13px; color: #aaa; text-align: center; display: none;"></div>
            <button class="btn" id="upload-btn" disabled>อัปโหลดและสร้างรหัส 6 หลัก</button>
            
            <div class="code-display" id="code-container">
                <div style="font-size: 14px; color: #aaa;">รหัสรับไฟล์ของคุณคือ</div>
                <div class="code-number" id="generated-code">000000</div>
                <div style="font-size: 12px; color: #888;">นำรหัสนี้ไปกรอกที่คอมพิวเตอร์เพื่อดาวน์โหลดไฟล์<br><span class="highlight">(หมดอายุใน 15 นาที)</span></div>
            </div>
            <div class="status-msg" id="upload-status"></div>
        </div>

        <div class="section-title">📥 รับไฟล์ (Download)</div>
        <div class="card">
            <div class="receive-input-wrapper">
                <div class="receive-input-cell">
                    <label for="code-input">กรอกรหัส 6 หลัก</label>
                    <input type="text" id="code-input" placeholder="XXXXXX" maxlength="6">
                </div>
                <div class="receive-btn-cell">
                    <button class="btn" id="download-btn">ดาวน์โหลด</button>
                </div>
            </div>
            <div class="status-msg" id="download-status"></div>
        </div>
    </div>

    <script>
        const dropArea = document.getElementById('drop-area');
        const fileInput = document.getElementById('file-input');
        const dropText = document.getElementById('drop-text');
        const fileInfo = document.getElementById('file-info');
        const uploadBtn = document.getElementById('upload-btn');
        const codeContainer = document.getElementById('code-container');
        const generatedCode = document.getElementById('generated-code');
        const uploadStatus = document.getElementById('upload-status');
        const codeInput = document.getElementById('code-input');
        const downloadBtn = document.getElementById('download-btn');
        const downloadStatus = document.getElementById('download-status');

        let selectedFile = null;
        let supabase = null;

        // ดึงค่า Config เก่าจากเครื่องผู้ใช้มาใส่ให้ช่องอินพุตอัตโนมัติ
        document.getElementById('supabase-url').value = localStorage.getItem('sb_url') || '';
        document.getElementById('supabase-key').value = localStorage.getItem('sb_key') || '';

        // เชื่อมต่อ Supabase
        function initSupabase() {
            const url = document.getElementById('supabase-url').value.trim();
            const key = document.getElementById('supabase-key').value.trim();
            
            if (!url || !key) {
                alert('กรุณากรอก Supabase URL และ Anon Key ด้านบนก่อนใช้งานครับ!');
                return false;
            }
            
            localStorage.setItem('sb_url', url);
            localStorage.setItem('sb_key', key);
            
            supabase = supabaseJS.createClient(url, key);
            return true;
        }

        // จัดการเหตุการณ์ลากและคลิกไฟล์
        dropArea.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => handleFileSelection(e.target.files[0]));
        dropArea.addEventListener('dragover', (e) => { e.preventDefault(); dropArea.style.borderColor = '#ff3333'; });
        dropArea.addEventListener('dragleave', () => dropArea.style.borderColor = '#444444');
        dropArea.addEventListener('drop', (e) => {
            e.preventDefault();
            dropArea.style.borderColor = '#444444';
            handleFileSelection(e.dataTransfer.files[0]);
        });

        function handleFileSelection(file) {
            if (!file) return;
            selectedFile = file;
            dropText.innerText = "เปลี่ยนไฟล์ที่เลือก";
            fileInfo.innerText = `ไฟล์ที่เลือก: ${file.name} (${(file.size / (1024 * 1024)).toFixed(2)} MB)`;
            fileInfo.style.display = 'block';
            uploadBtn.disabled = false;
            codeContainer.style.display = 'none';
            uploadStatus.innerHTML = '';
        }

        // ลอจิกการอัปโหลดไฟล์
        uploadBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            if (!initSupabase()) return;

            uploadBtn.disabled = true;
            uploadStatus.className = "status-msg status-loading";
            uploadStatus.innerText = "กำลังอัปโหลดไฟล์เข้าระบบ...";

            try {
                // 1. สุ่มรหัส 6 หลัก
                const code = Math.floor(100000 + Math.random() * 900000).toString();
                const safeFileName = selectedFile.name.replace(/[^a-zA-Z0-9.-]/g, '_');
                const storagePath = `${code}/${safeFileName}`;

                // 2. อัปโหลดเข้า Storage Bucket ชื่อ 'drops'
                const { data: storageData, error: storageError } = await supabase.storage
                    .from('drops')
                    .upload(storagePath, selectedFile, { cacheControl: '3600', upsert: true });

                if (storageError) throw storageError;

                // 3. ดึง Public URL ของไฟล์ออกมาชั่วคราว
                const { data: urlData } = supabase.storage.from('drops').getPublicUrl(storagePath);
                const fileUrl = urlData.publicUrl;

                // 4. บันทึกโค้ดและลิงก์ลงฐานข้อมูลตาราง 'files'
                const { error: dbError } = await supabase
                    .from('files')
                    .insert([{ code: code, file_url: fileUrl, file_name: selectedFile.name }]);

                if (dbError) throw dbError;

                // อัปโหลดสำเร็จ -> แสดงเลข 6 หลักให้ผู้ใช้เอาไปกรอก
                generatedCode.innerText = code;
                codeContainer.style.display = 'block';
                uploadStatus.className = "status-msg status-success";
                uploadStatus.innerText = "อัปโหลดเสร็จสมบูรณ์!";
                
                // เคลียร์ค่าหน้าฟอร์ม
                selectedFile = null;
                fileInfo.style.display = 'none';
                dropText.innerText = "📁 ลากไฟล์มาวางที่นี่ หรือ คลิกเพื่อเลือกไฟล์";

            } catch (err) {
                console.error(err);
                uploadStatus.className = "status-msg status-error";
                uploadStatus.innerText = `เกิดข้อผิดพลาด: ${err.message || err}`;
                uploadBtn.disabled = false;
            }
        });

        // ลอจิกการรับรหัสและดาวน์โหลดไฟล์
        downloadBtn.addEventListener('click', async () => {
            const code = codeInput.value.trim();
            if (code.length !== 6) {
                alert('กรุณากรอกรหัสรับไฟล์ให้ครบ 6 หลัก');
                return;
            }
            if (!initSupabase()) return;

            downloadBtn.disabled = true;
            downloadStatus.className = "status-msg status-loading";
            downloadStatus.innerText = "กำลังตรวจสอบรหัสและค้นหาไฟล์...";

            try {
                // ค้นหาโค้ดโดยเช็กว่าเวลาสร้าง (created_at) ต้องไม่เกิน 15 นาทีที่ผ่านมา
                const fifteenMinutesAgo = new Date(Date.now() - 15 * 60 * 1000).toISOString();
                
                const { data, error } = await supabase
                    .from('files')
                    .select('file_url, file_name')
                    .eq('code', code)
                    .gt('created_at', fifteenMinutesAgo)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (data && data.length > 0) {
                    const record = data[0];
                    downloadStatus.className = "status-msg status-success";
                    downloadStatus.innerText = "พบไฟล์! กำลังเปิดหน้าต่างดาวน์โหลด...";
                    
                    // สั่งให้เบราว์เซอร์เปิดดาวน์โหลดไฟล์นั้นทันที
                    const link = document.createElement('a');
                    link.href = record.file_url;
                    link.download = record.file_name;
                    link.target = '_blank';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                } else {
                    downloadStatus.className = "status-msg status-error";
                    downloadStatus.innerText = "ไม่พบรหัสนี้ หรือไฟล์หมดอายุ 15 นาทีไปแล้ว";
                }
            } catch (err) {
                console.error(err);
                downloadStatus.className = "status-msg status-error";
                downloadStatus.innerText = `เกิดข้อผิดพลาด: ${err.message || err}`;
            } finally {
                downloadBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
