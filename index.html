<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6-Digit Drop Share (15 Min Expired)</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Sarabun, sans-serif;
        }
        body {
            background-color: #0d0d0d;
            color: #ffffff;
            display: block;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 650px;
            margin: 0 auto;
            background-color: #1a1a1a;
            border: 1px solid #333333;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
        }
        h1 {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
            color: #ffffff;
        }
        .subtitle {
            text-align: center;
            color: #aaaaaa;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .highlight {
            color: #ff3333;
            font-weight: bold;
        }
        .section-title {
            font-size: 16px;
            font-weight: bold;
            border-left: 4px solid #ff3333;
            padding-left: 10px;
            margin-bottom: 15px;
            margin-top: 20px;
        }
        .card {
            background-color: #222222;
            border: 1px solid #333333;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
        }
        .file-drop-area {
            border: 2px dashed #444444;
            border-radius: 6px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            background-color: #151515;
            transition: all 0.3s;
            position: relative;
        }
        .file-drop-area:hover, .file-drop-area.dragover {
            border-color: #ff3333;
            background-color: #1a1212;
        }
        /* แก้ไขเพื่อให้สามารถคลิกทะลุไปโดนตัวเลือกไฟล์ได้แน่นอน */
        .file-input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        .btn {
            display: block;
            width: 100%;
            background-color: #ff3333;
            color: #ffffff;
            border: none;
            padding: 12px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
            transition: background 0.2s;
            margin-top: 15px;
        }
        .btn:hover {
            background-color: #cc0000;
        }
        .btn:disabled {
            background-color: #555555;
            cursor: not-allowed;
        }
        .code-display {
            display: none;
            background-color: #000000;
            border: 2px solid #ff3333;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            margin-top: 15px;
        }
        .code-number {
            font-size: 36px;
            font-weight: bold;
            letter-spacing: 4px;
            color: #ff3333;
            margin: 10px 0;
        }
        .receive-input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            width: 100%;
        }
        .receive-input-cell {
            flex: 1;
        }
        .receive-input-wrapper input {
            font-size: 20px;
            letter-spacing: 2px;
            text-align: center;
            padding: 10px;
        }
        .receive-btn-cell {
            width: 30%;
        }
        .receive-btn-cell .btn {
            margin-top: 0;
            padding: 13px;
        }
        .status-msg {
            font-size: 13px;
            margin-top: 10px;
            text-align: center;
        }
        .status-success { color: #00ffcc; }
        .status-error { color: #ff3333; }
        .status-loading { color: #ffff00; }
    </style>
</head>
<body>

    <div class="container">
        <h1>6-DIGIT <span class="highlight">DROP SHARE</span></h1>
        <div class="subtitle">ระบบส่งไฟล์ข้ามอุปกรณ์ด่วน ทำลายตัวเองใน 15 นาที</div>

        <div class="section-title">📤 ส่งไฟล์ (Upload)</div>
        <div class="card">
            <div class="file-drop-area" id="drop-area">
                <span id="drop-text">📁 ลากไฟล์มาวางที่นี่ หรือ คลิกเพื่อเลือกไฟล์</span>
                <input type="file" id="file-input" class="file-input">
            </div>
            <div id="file-info" style="margin-top: 10px; font-size: 13px; color: #aaa; text-align: center; display: none;"></div>
            <button class="btn" id="upload-btn" disabled>อัปโหลดและสร้างรหัส 6 หลัก</button>
            
            <div class="code-display" id="code-container">
                <div style="font-size: 14px; color: #aaa;">รหัสรับไฟล์ของคุณคือ</div>
                <div class="code-number" id="generated-code">000000</div>
                <div style="font-size: 12px; color: #888;">นำรหัสนี้ไปกรอกที่คอมพิวเตอร์เพื่อดาวน์โหลดไฟล์<br><span class="highlight">(หมดอายุใน 15 นาที)</span></div>
            </div>
            <div class="status-msg" id="upload-status"></div>
        </div>

        <div class="section-title">📥 รับไฟล์ (Download)</div>
        <div class="card">
            <div class="receive-input-wrapper">
                <div class="receive-input-cell">
                    <label for="code-input" style="margin-bottom: 5px; display: block; font-size: 12px; color: #bbbbbb;">กรอกรหัส 6 หลัก</label>
                    <input type="text" id="code-input" placeholder="XXXXXX" maxlength="6">
                </div>
                <div class="receive-btn-cell">
                    <button class="btn" id="download-btn">ดาวน์โหลด</button>
                </div>
            </div>
            <div class="status-msg" id="download-status"></div>
        </div>
    </div>

    <script>
        // ฝังรหัสเชื่อมต่อ Supabase ของคุณไว้ที่นี่โดยตรง ปลอดภัยและสะดวกที่สุด
        const SUPABASE_URL = "https://hsbxobbvxvakrtbqhvgx.supabase.co";
        const SUPABASE_KEY = "sb_publishable_BiO61FeG7BuQaV8UuRqxGQ_0uMWR05p";

        const dropArea = document.getElementById('drop-area');
        const fileInput = document.getElementById('file-input');
        const dropText = document.getElementById('drop-text');
        const fileInfo = document.getElementById('file-info');
        const uploadBtn = document.getElementById('upload-btn');
        const codeContainer = document.getElementById('code-container');
        const generatedCode = document.getElementById('generated-code');
        const uploadStatus = document.getElementById('upload-status');
        const codeInput = document.getElementById('code-input');
        const downloadBtn = document.getElementById('download-btn');
        const downloadStatus = document.getElementById('download-status');

        let selectedFile = null;
        let supabase = null;

        // ฟังก์ชันเริ่มเชื่อมต่อฐานข้อมูลโดยดึงจากค่าคงที่ด้านบนอัตโนมัติ
        function initSupabase() {
            if (!supabase) {
                supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            }
            return true;
        }

        // จัดการเหตุการณ์เมื่อคลิกหรือเปลี่ยนไฟล์
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFileSelection(e.target.files[0]);
            }
        });

        // จัดการระบบลากและวางไฟล์ (Drag and Drop) ป้องกันเบราว์เซอร์เปิดหน้าต่างใหม่
        window.addEventListener('dragover', (e) => e.preventDefault());
        window.addEventListener('drop', (e) => e.preventDefault());

        dropArea.addEventListener('dragover', (e) => { 
            e.preventDefault(); 
            dropArea.classList.add('dragover'); 
        });
        
        dropArea.addEventListener('dragleave', () => { 
            dropArea.classList.remove('dragover'); 
        });
        
        dropArea.addEventListener('drop', (e) => {
            e.preventDefault();
            dropArea.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                handleFileSelection(e.dataTransfer.files[0]);
            }
        });

        function handleFileSelection(file) {
            if (!file) return;
            selectedFile = file;
            dropText.innerText = "เปลี่ยนไฟล์ที่เลือก";
            fileInfo.innerText = `ไฟล์ที่เลือก: ${file.name} (${(file.size / (1024 * 1024)).toFixed(2)} MB)`;
            fileInfo.style.display = 'block';
            uploadBtn.disabled = false;
            codeContainer.style.display = 'none';
            uploadStatus.innerHTML = '';
        }

        // ลоจิกการอัปโหลดไฟล์
        uploadBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            initSupabase();

            uploadBtn.disabled = true;
            uploadStatus.className = "status-msg status-loading";
            uploadStatus.innerText = "กำลังอัปโหลดไฟล์เข้าระบบ...";

            try {
                const code = Math.floor(100000 + Math.random() * 900000).toString();
                const safeFileName = selectedFile.name.replace(/[^a-zA-Z0-9.-]/g, '_');
                const storagePath = `${code}/${safeFileName}`;

                // อัปโหลดเข้า Storage Bucket
                const { data: storageData, error: storageError } = await supabase.storage
                    .from('drops')
                    .upload(storagePath, selectedFile, { cacheControl: '3600', upsert: true });

                if (storageError) throw storageError;

                // ดึง Public URL ของไฟล์
                const { data: urlData } = supabase.storage.from('drops').getPublicUrl(storagePath);
                const fileUrl = urlData.publicUrl;

                // บันทึกข้อมูลโค้ดลงฐานข้อมูล
                const { error: dbError } = await supabase
                    .from('files')
                    .insert([{ code: code, file_url: fileUrl, file_name: selectedFile.name }]);

                if (dbError) throw dbError;

                // อัปโหลดสำเร็จ -> แสดงเลข 6 หลัก
                generatedCode.innerText = code;
                codeContainer.style.display = 'block';
                uploadStatus.className = "status-msg status-success";
                uploadStatus.innerText = "อัปโหลดเสร็จสมบูรณ์!";
                
                selectedFile = null;
                fileInput.value = ''; // รีเซ็ตอินพุตไฟล์
                fileInfo.style.display = 'none';
                dropText.innerText = "📁 ลากไฟล์มาวางที่นี่ หรือ คลิกเพื่อเลือกไฟล์";

            } catch (err) {
                console.error(err);
                uploadStatus.className = "status-msg status-error";
                uploadStatus.innerText = `เกิดข้อผิดพลาด: ${err.message || err}`;
                uploadBtn.disabled = false;
            }
        });

        // ลอจิกการดาวน์โหลดไฟล์
        downloadBtn.addEventListener('click', async () => {
            const code = codeInput.value.trim();
            if (code.length !== 6) {
                alert('กรุณากรอกรหัสรับไฟล์ให้ครบ 6 หลัก');
                return;
            }
            initSupabase();

            downloadBtn.disabled = true;
            downloadStatus.className = "status-msg status-loading";
            downloadStatus.innerText = "กำลังตรวจสอบรหัสและค้นหาไฟล์...";

            try {
                const fifteenMinutesAgo = new Date(Date.now() - 15 * 60 * 1000).toISOString();
                
                const { data, error } = await supabase
                    .from('files')
                    .select('file_url, file_name')
                    .eq('code', code)
                    .gt('created_at', fifteenMinutesAgo)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (data && data.length > 0) {
                    const record = data[0];
                    downloadStatus.className = "status-msg status-success";
                    downloadStatus.innerText = "พบไฟล์! กำลังเปิดหน้าต่างดาวน์โหลด...";
                    
                    const link = document.createElement('a');
                    link.href = record.file_url;
                    link.download = record.file_name;
                    link.target = '_blank';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                } else {
                    downloadStatus.className = "status-msg status-error";
                    downloadStatus.innerText = "ไม่พบรหัสนี้ หรือไฟล์หมดอายุ 15 นาทีไปแล้ว";
                }
            } catch (err) {
                console.error(err);
                downloadStatus.className = "status-msg status-error";
                downloadStatus.innerText = `เกิดข้อผิดพลาด: ${err.message || err}`;
            } finally {
                downloadBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
